<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lift.me - Aprenda Fazendo</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full text-white">
    <div id="app" class="h-full w-full flex flex-col relative">
        
        <div id="page-login" class="page active w-full h-full overflow-auto">
            <div class="min-h-full w-full bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
                <div class="w-full max-w-md">
                    <div class="text-center mb-12">
                        <div class="inline-block mb-4">
                            <div class="text-5xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent" style="font-family: 'Space Grotesk', sans-serif;">
                                Lift.me
                            </div>
                        </div>
                        <p class="text-gray-300 text-lg mb-2">Aprenda Fazendo</p>
                        <p class="text-gray-500 text-sm">Transforme suas habilidades em crescimento real</p>
                    </div>

                    <div class="bg-white/5 border border-white/10 rounded-2xl p-8 backdrop-blur-xl">
                        <div class="space-y-4 mb-6">
                            <div>
                                <label class="block text-sm font-medium mb-2 text-gray-300">Nome</label>
                                <input id="login-username" type="text" placeholder="Seu nome completo" class="w-full input-field px-4 py-3 rounded-lg text-white placeholder-gray-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2 text-gray-300">Email</label>
                                <input id="login-email" type="email" placeholder="seu@email.com" class="w-full input-field px-4 py-3 rounded-lg text-white placeholder-gray-500">
                            </div>
                        </div>
                        <button onclick="handleLogin()" class="w-full btn-primary text-white font-semibold py-3 rounded-lg mb-4"> Começar Agora </button>
                    </div>
                </div>
            </div>
        </div>

        <nav id="main-nav" class="hidden fixed bottom-0 left-0 right-0 bg-gradient-to-r from-slate-900/95 to-slate-800/95 border-t border-white/10 backdrop-blur-xl z-40">
            <div class="flex justify-around items-center h-20 px-4 max-w-md mx-auto w-full">
                <button onclick="showPage('home')" class="nav-btn active flex flex-col items-center gap-1 p-3 rounded-lg transition-all">
                    <i data-lucide="home"></i> <span class="text-xs">Home</span>
                </button>
                <button onclick="showPage('trails')" class="nav-btn flex flex-col items-center gap-1 p-3 rounded-lg transition-all">
                    <i data-lucide="map"></i> <span class="text-xs">Trilhas</span>
                </button>
                <button onclick="showPage('projects')" class="nav-btn flex flex-col items-center gap-1 p-3 rounded-lg transition-all">
                    <i data-lucide="code"></i> <span class="text-xs">Projetos</span>
                </button>
                <button onclick="showPage('progress')" class="nav-btn flex flex-col items-center gap-1 p-3 rounded-lg transition-all">
                    <i data-lucide="trending-up"></i> <span class="text-xs">Progresso</span>
                </button>
                <button onclick="showPage('careers')" class="nav-btn flex flex-col items-center gap-1 p-3 rounded-lg transition-all">
                    <i data-lucide="briefcase"></i> <span class="text-xs">Carreiras</span>
                </button>
            </div>
        </nav>

        <main class="flex-1 overflow-auto pb-24">
            <div id="page-home" class="page w-full h-full overflow-auto">
                <div class="p-8 max-w-4xl mx-auto">
                    <h1 id="user-greeting" class="text-3xl font-bold">Bem-vindo!</h1>
                    </div>
            </div>
            
            <div id="page-trails" class="page w-full h-full"><div id="trails-grid" class="p-8 grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
            <div id="page-projects" class="page w-full h-full"><div id="projects-grid" class="p-8 grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
            <div id="page-progress" class="page w-full h-full">
                <div class="p-8">
                    <div id="xp-bar" class="h-4 bg-emerald-500 rounded-full transition-all" style="width: 0%"></div>
                    <div id="history-list" class="mt-4"></div>
                </div>
            </div>
            <div id="page-careers" class="page w-full h-full"><div id="careers-grid" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-4"></div></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
